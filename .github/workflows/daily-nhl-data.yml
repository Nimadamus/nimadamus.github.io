name: Daily NHL Data Sync

on:
  schedule:
    # Run at 11:00 AM ET (16:00 UTC) daily - after most previous night's games are final
    - cron: '0 16 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-nhl-data:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run NHL data sync
        run: python scripts/sync_nhl_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhl-standings-data.json nhl-home-away-splits.html nhl-totals-trends.html nhl-team-trends.html nhl-betting-hub.html
          git commit -m "Auto-sync NHL standings data from NHL API"
          git push
