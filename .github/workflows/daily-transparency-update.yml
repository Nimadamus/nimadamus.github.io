name: Daily Transparency Widget Update

on:
  schedule:
    # Run at 11:00 AM ET (16:00 UTC) every day
    - cron: '0 16 * * *'
  push:
    paths:
      - 'nhl-records.html'
      - 'nfl-records.html'
      - 'ncaaf-records.html'
      - 'scripts/generate_transparency_data.py'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-transparency-data:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate transparency widget data
        run: python scripts/generate_transparency_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transparency-widget-data.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update transparency widget data $(date +'%Y-%m-%d')"
            git push
          fi
